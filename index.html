<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse and search songs from our karaoke machine.">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0f172a">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0e14">
  <title>Karaoke Songbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#0f172a">
  <meta name="msapplication-TileColor" content="#0f172a">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to song list</a>

  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-brand">
        <span class="app-brand__icon" aria-hidden="true"><i class="fas fa-microphone-lines"></i></span>
        <div class="app-brand__text">
          <h1 class="app-brand__title">Karaoke Songbook</h1>
          <p class="app-brand__tagline">Search by title or tap a letter—then use the number on the machine.</p>
        </div>
      </div>
    </div>
  </header>

  <div class="toolbar sticky-search">
    <div class="toolbar__inner search-bar">
      <div class="search-bar__field">
        <label class="visually-hidden" for="searchInput">Search songs</label>
        <input class="form-control search-input" id="searchInput" type="search" placeholder="Search by song name…" autocomplete="off" enterkeyhint="search" aria-label="Search for a song">
      </div>
      <button type="button" class="btn btn-primary btn-icon" id="searchBtn" aria-label="Search">
        <i class="fas fa-search" aria-hidden="true"></i>
      </button>
      <button type="button" class="btn btn-primary btn-icon" id="openQueueModal" aria-label="Open your song list" aria-haspopup="dialog">
        <i class="fas fa-list" aria-hidden="true"></i>
      </button>
      <div class="dropdown">
        <button type="button" class="btn btn-outline-light btn-icon dropdown-toggle btn-source" id="driveToggle" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Song source">
          <i class="fas fa-database" aria-hidden="true"></i>
          <span class="btn-source__label" id="driveLabel">Memory Card</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="driveToggle">
          <li><button type="button" class="dropdown-item" data-drive="A">Memory Card</button></li>
          <li><button type="button" class="dropdown-item" data-drive="B">Main database</button></li>
        </ul>
      </div>
    </div>
  </div>

  <main id="main-content" class="main-wrap">
    <div class="song-grid" id="songTable" aria-live="polite" aria-busy="false"></div>
    <div class="loading" id="loading" hidden>Loading more songs…</div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">
    <i class="fas fa-check-circle" aria-hidden="true"></i>
    <span id="toast-message">Song added to your list.</span>
  </div>

  <div class="modal fade" id="queueModal" tabindex="-1" aria-labelledby="queueModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title h5" id="queueModalLabel">Your song list</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p class="queue-hint">Your list is stored in this browser so it survives refresh—use clear when you want to start over.</p>
          <div class="queue-toolbar">
            <div class="dropdown queue-toolbar__btn">
              <button class="btn btn-queue-action btn-queue-action--share dropdown-toggle" type="button" id="shareDropdown" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Share your list">
                <i class="fas fa-share-nodes" aria-hidden="true"></i> Share list
              </button>
              <ul class="dropdown-menu dropdown-menu-end w-100" aria-labelledby="shareDropdown">
                <li><button type="button" class="dropdown-item" data-share="whatsapp"><i class="fab fa-whatsapp" aria-hidden="true"></i> WhatsApp</button></li>
                <li><button type="button" class="dropdown-item" data-share="email"><i class="fas fa-envelope" aria-hidden="true"></i> Email</button></li>
              </ul>
            </div>
            <button type="button" class="btn btn-queue-action btn-queue-action--clear queue-toolbar__btn" id="clearQueueBtn" aria-label="Clear entire song list">
              <i class="fas fa-trash-can" aria-hidden="true"></i> Clear list
            </button>
          </div>
          <div id="queueTable" class="queue-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="songs.js"></script>
  <script src="app-logic.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>
</body>
</html>
